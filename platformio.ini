; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; [env:esp32-c3-devkitm-1]
; platform = espressif32@6.5.0  ; 使用 ESP32-C3 Super Mini
; board = esp32-c3-devkitm-1

[env:airm2m_core_esp32c3]
platform = espressif32@6.5.0
board = airm2m_core_esp32c3   ; 使用合宙 CORE ESP32
framework = arduino   ;, espidf    ; 关键：同时指定两个框架
board_build.partitions = partitions.csv

board_build.stack_size = 32768


; ========== 串口监视器配置 ==========
monitor_speed = 115200
;monitor_port = COM3          ; 改成你电脑上实际的端口号（如 COM3、COM5 等）
monitor_port = COM10          ; 改成你电脑上实际的端口号（如 COM3、COM5 等）

build_src_filter =    
;   +<wifi_scan_test.cpp>
;   +<ttp223_test.cpp>    
;   +<dht11_test.cpp>         ; 只包含测试文件

;    -<main.cpp>               ; 排除主文件
;    -<*.cpp>                  ; 排除所有其他 .cpp 文件

; ========== USB 串口配置（ESP32-C3 原生 USB 必须）==========
build_flags = 
    -Dlibsodium=1
    ; -DARDUINO_USB_MODE=1
    ; -DARDUINO_USB_CDC_ON_BOOT=1
    -Iinclude
    -IC:/Users/user/.platformio/packages/framework-arduinoespressif32@3.20014.231204/tools/sdk/esp32c3/include/libsodium/libsodium/src/libsodium/include
    -D WARNINGS_DISABLED
    -Wno-cpp 
    -D TFT_ESP32_C3_DMA_WARNING_DISABLED
    -DSODIUM_USE_STATIC_LIBS  
    -Wno-error=implicit-function-declaration

    ; ---- loopTask 栈大小：ESP32 Arduino 默认 8KB ----
    ; Arduino core main.cpp 里用 `ARDUINO_LOOP_STACK_SIZE` 作为宏门槛（#ifndef ARDUINO_LOOP_STACK_SIZE），
    ; 不能用 CONFIG_ARDUINO_LOOP_STACK_SIZE 这个 sdkconfig 宏，因为 sdkconfig.h 又 #define 它为 8192，
    ; 走不进 #else 分支。直接自定义宏才能作效。
    -DARDUINO_LOOP_STACK_SIZE=32768

    ; ----- 重要：告诉 TFT_eSPI 使用我们下面的配置，而非默认的 User_Setup.h 文件 -----
    -DUSER_SETUP_LOADED=1

    ; ----- 驱动和屏幕参数（针对 ST7789 320x170 屏幕）-----
    -DST7789_DRIVER=1
    -DTFT_WIDTH=170 
    -DTFT_HEIGHT=320
    -DTOUCH_CS=-1
    ; 颜色顺序，部分屏幕可能需要改为 TFT_BGR
    ;-DTFT_RGB_ORDER=TFT_RGB

    ; ----- SPI 通信频率（40MHz 对 ST7789 通常很稳定）-----
    -DSPI_FREQUENCY=40000000         

    ; ----- 可选：启用常用字体（会略微增加编译体积）-----
    -DSMOOTH_FONT=1	;平滑字体功能的核心开关，使用 loadFont() 加载 .h 字库的前提
    -DLOAD_GLCD=1	;最基础的备用字体（约1.8KB），万一自定义字体加载失败，屏幕还能显示调试信息

    ; ----- 如果屏幕颜色显示异常（红蓝颠倒），取消下面这行的注释 -----
    ; -DTFT_RGB_ORDER=TFT_BGR=1

    ; ----- TFT 引脚配置 -----
    -DTFT_CS=0
    -DTFT_DC=1
    -DTFT_RST=2
    -DTFT_MOSI=3                   ; 注意：这里对应你的 TFT_SDA
    -DTFT_SCLK=4
    -DTFT_BL=5                     ; 背光控制


lib_deps = 
    ; 1. TFT_eSPI - 屏幕驱动核心库
      bodmer/TFT_eSPI@^2.5.43
    ; 2. PNGdec - PNG图片解码库
     bitbank2/PNGdec@^1.0.0
    ; 3. 功能库
    bblanchon/ArduinoJson @ ^7.0.0
    ; 4. ArduinoUZlib - gzip解压库
    nodaoli/ArduinoUZlib @ ^1.0.2
    milesburton/DallasTemperature @ ^3.9.1   ; 温度传感器的高级操作库
    paulstoffregen/OneWire @ ^2.3.7          ; 单总线通信协议的基础库
    adafruit/DHT sensor library @ ^1.4.4     ; DHT11/DHT22 传感器库
    
; ========== 串口监视器信号配置（解决 setup() 输出丢失问题）==========
monitor_rts = 0
monitor_dtr = 0

; ========== 可选：常用过滤器 ==========
monitor_filters = 
    time                    ; 添加时间戳
    esp32_exception_decoder ; 自动解码崩溃信息
    log2file  